<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080808" />
    <title>Offline | Stock Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #080808;
        color: #f5f5f5;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: #111111;
        border: 1px solid #1f1f1f;
        border-radius: 0;
        padding: 20px;
        max-width: 420px;
        text-align: center;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>Static content is cached. Reconnect to resume live stock updates.</p>
      <a href="/">Go to dashboard</a>
    </main>
  </body>
</html>
